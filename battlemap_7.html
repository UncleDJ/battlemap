<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BattleMap — Tabletop RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-dim:#c9a84c33;--gold-bright:#e0c060;
  --bg-deep:#0d0d18;--bg-panel:#16192e;--bg-card:#1c2040;
  --border:#2a2d4a;--border-gold:#c9a84c55;
  --text:#e8e0d0;--text-muted:#8a8090;
  --red:#c94c4c;--green:#4cb87c;--blue:#4c7ec9;
}
body{font-family:'Crimson Text',Georgia,serif;background:var(--bg-deep);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,#c9a84c18 0%,transparent 70%),repeating-linear-gradient(0deg,transparent,transparent 59px,#c9a84c08 59px,#c9a84c08 60px),repeating-linear-gradient(90deg,transparent,transparent 59px,#c9a84c08 59px,#c9a84c08 60px);pointer-events:none}
.login-crest{font-family:'Cinzel',serif;font-size:48px;color:var(--gold);letter-spacing:6px;margin-bottom:6px;animation:glow 3s ease-in-out infinite alternate}
@keyframes glow{from{text-shadow:0 0 20px #c9a84c44}to{text-shadow:0 0 60px #c9a84caa,0 0 100px #c9a84c44}}
.login-sub{font-family:'Cinzel',serif;font-size:11px;letter-spacing:5px;color:var(--text-muted);margin-bottom:40px;text-transform:uppercase}
.login-box{background:var(--bg-panel);border:1px solid var(--border-gold);border-radius:4px;padding:32px;width:360px;display:flex;flex-direction:column;gap:16px}
.fl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:-8px}
.fi{background:var(--bg-deep);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:10px 14px;font-family:'Crimson Text',serif;font-size:16px;outline:none;width:100%;transition:border-color .2s}
.fi:focus{border-color:var(--gold)}
.role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.role-btn{padding:12px 6px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--text-muted);font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.role-btn .ri{font-size:22px}
.role-btn:hover{border-color:var(--gold);color:var(--gold)}
.role-btn.sel{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
.enter-btn{padding:14px;background:linear-gradient(135deg,#a8892c,#c9a84c,#a8892c);border:none;border-radius:3px;color:#0d0d18;font-family:'Cinzel',serif;font-size:13px;font-weight:600;letter-spacing:3px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.enter-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}

/* APP */
#app{display:none;flex-direction:column;height:100vh}
#toolbar{background:var(--bg-panel);border-bottom:1px solid var(--border-gold);padding:0 10px;display:flex;align-items:center;gap:6px;height:48px;flex-shrink:0;overflow:hidden}
.tb-brand{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--gold);letter-spacing:3px;white-space:nowrap}
.tb-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.tb-btn{padding:5px 10px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--text-muted);font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tb-btn:hover{border-color:var(--gold);color:var(--gold)}
.tb-btn.active{border-color:var(--gold);background:var(--gold-dim);color:var(--gold)}
.tb-btn.danger:hover{border-color:var(--red);color:var(--red)}
.tb-btn.terrain-btn{color:#7ab0f5;border-color:#4c7ec966}
.tb-btn.terrain-btn:hover{border-color:#7ab0f5}
.tb-btn.init-active{border-color:var(--green);background:#4cb87c22;color:var(--green)}
.rbadge{padding:3px 10px;border-radius:2px;font-family:'Cinzel',serif;font-size:9px;font-weight:600;letter-spacing:2px;flex-shrink:0}
.b-gm{background:#c9a84c22;color:var(--gold);border:1px solid var(--border-gold)}
.b-player{background:#4c7ec922;color:#7ab0f5;border:1px solid #4c7ec966}
.b-observer{background:#55555522;color:#888;border:1px solid #55555566}
#tb-name{font-size:13px;color:var(--text-muted);font-style:italic;white-space:nowrap}
.tbl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;color:var(--text-muted);white-space:nowrap}
.tbn{background:var(--bg-deep);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:4px 8px;font-family:'Crimson Text',serif;font-size:14px;outline:none;width:60px}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg-deep);cursor:crosshair}
#battlemap-canvas{position:absolute;top:0;left:0}
.turn-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold);background:var(--bg-panel);border:1px solid var(--border-gold);border-radius:3px;padding:6px 18px;z-index:5;display:none;white-space:nowrap;pointer-events:none}
.lock-banner{position:absolute;top:10px;right:10px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--red);background:var(--bg-panel);border:1px solid #c94c4c55;border-radius:3px;padding:5px 12px;z-index:5;display:none;pointer-events:none}

/* SIDEBAR */
#sidebar{width:220px;background:var(--bg-panel);border-left:1px solid var(--border-gold);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}

/* INITIATIVE PANEL */
#init-panel{flex-shrink:0;border-bottom:2px solid var(--border-gold)}
#init-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 6px;background:var(--bg-card)}
.init-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold)}
.init-active-badge{font-family:'Cinzel',serif;font-size:8px;padding:2px 7px;border-radius:2px;background:#4cb87c22;color:var(--green);border:1px solid #4cb87c55;display:none}
#init-list{max-height:250px;overflow-y:auto}
.irow{display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid var(--border);transition:background .15s;position:relative}
.irow.cur{background:linear-gradient(90deg,#c9a84c1a,transparent);border-left:3px solid var(--gold)}
.irow.cur .iname{color:var(--gold)}
.iav{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:1.5px solid #fff3;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.iscore{font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--gold);width:22px;text-align:center;flex-shrink:0}
.iname{font-size:13px;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.iturn{font-family:'Cinzel',serif;font-size:8px;color:var(--gold);letter-spacing:1px;white-space:nowrap;flex-shrink:0}
.iedit,.idel{background:none;border:none;cursor:pointer;padding:2px 3px;opacity:0;transition:opacity .15s;flex-shrink:0}
.irow:hover .iedit,.irow:hover .idel{opacity:1}
.iedit{color:var(--text-muted);font-size:12px}
.idel{color:var(--red);font-size:11px}
#init-empty{padding:14px 12px;font-size:12px;color:var(--text-muted);text-align:center;font-style:italic}
#init-footer{display:flex;gap:5px;padding:7px 8px;background:var(--bg-card);flex-shrink:0;display:none}
.icbtn{flex:1;padding:5px 4px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--text-muted);font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;cursor:pointer;text-align:center;transition:all .15s}
.icbtn:hover{border-color:var(--gold);color:var(--gold)}
.icbtn.next{border-color:var(--green);color:var(--green)}
.icbtn.next:hover{background:#4cb87c22}
.icbtn.end:hover{border-color:var(--red);color:var(--red)}

/* TOKEN LIST */
.stitle{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--text-muted);padding:10px 12px 8px;text-transform:uppercase;border-bottom:1px solid var(--border);flex-shrink:0}
#token-list{flex:1;overflow-y:auto}
.tok-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.tok-item:hover{background:var(--bg-card)}
.tok-av{width:26px;height:26px;flex-shrink:0;border:1.5px solid #fff3;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;overflow:hidden}
.tok-inf{flex:1;min-width:0}
.tok-n{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tok-o{font-size:10px;color:var(--text-muted);font-style:italic}
.tok-del{color:var(--red);font-size:13px;background:none;border:none;cursor:pointer;opacity:0;transition:opacity .15s;padding:2px 4px;flex-shrink:0}
.tok-item:hover .tok-del{opacity:1}
.tbadge{font-family:'Cinzel',serif;font-size:7px;color:#7ab0f5;background:#4c7ec922;border:1px solid #4c7ec944;border-radius:2px;padding:1px 4px}

#status-bar{background:var(--bg-deep);border-top:1px solid var(--border);padding:3px 12px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;color:var(--text-muted);display:flex;gap:16px;align-items:center;flex-shrink:0}

/* CONTEXT MENU */
.ctx-menu{position:fixed;background:var(--bg-card);border:1px solid var(--border-gold);border-radius:4px;padding:4px;z-index:1000;min-width:160px;box-shadow:0 8px 32px #00000088;display:none}
.ctx-item{padding:8px 14px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--text);cursor:pointer;border-radius:3px;transition:background .1s}
.ctx-item:hover{background:var(--bg-panel);color:var(--gold)}
.ctx-item.danger{color:var(--red)}
.ctx-item.danger:hover{background:#3a101022}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:#000b;z-index:2000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg-panel);border:1px solid var(--border-gold);border-radius:4px;padding:28px;width:380px;max-width:96vw;display:flex;flex-direction:column;gap:14px;box-shadow:0 16px 64px #00000099;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);letter-spacing:2px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.modal-btns button{padding:8px 18px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .15s}
.modal-btns button:hover{border-color:var(--gold);color:var(--gold)}
.modal-btns button.primary{background:var(--gold);border-color:var(--gold);color:#0d0d18;font-weight:600}
.mlabel{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}
input[type=color]{width:40px;height:34px;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:none;padding:2px}
.cp-row{display:flex;gap:6px;flex-wrap:wrap}
.cp{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s,transform .15s}
.cp:hover{transform:scale(1.15)}
.cp.s{border-color:#fff}
.chk-row{display:flex;align-items:center;gap:10px;padding:2px 0}
.chk-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
.chk-row label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--text-muted);cursor:pointer}

/* INITIATIVE TABLE in modal */
.init-tbl{width:100%;border-collapse:collapse}
.init-tbl th{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-muted);padding:4px 8px;text-align:left;border-bottom:1px solid var(--border)}
.init-tbl td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.init-tbl input[type=number]{background:var(--bg-deep);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:4px 8px;font-family:'Crimson Text',serif;font-size:15px;width:70px;outline:none;text-align:center}
.init-tbl input[type=number]:focus{border-color:var(--gold)}
.init-tbl input[type=checkbox]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
.tok-dot{width:16px;height:16px;border-radius:50%;display:inline-block;flex-shrink:0}

.empty-msg{padding:16px 12px;font-size:12px;color:var(--text-muted);text-align:center;font-style:italic}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg-deep)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
input[type=file]{display:none}
/* Rotation mode cursor */
#canvas-wrap.rotating-mode,#canvas-wrap.rotating-mode #battlemap-canvas{cursor:crosshair!important}
/* Canvas-only fullscreen */
#canvas-wrap:fullscreen,#canvas-wrap:-webkit-full-screen,#canvas-wrap:-moz-full-screen{width:100vw!important;height:100vh!important}
#canvas-wrap:fullscreen #battlemap-canvas,#canvas-wrap:-webkit-full-screen #battlemap-canvas{position:absolute;top:0;left:0}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-crest">&#9876; BATTLEMAP</div>
  <div class="login-sub">Tabletop RPG Shared Map</div>
  <div class="login-box">
    <div class="fl">Room Name</div>
    <input class="fi" id="room-in" type="text" placeholder="e.g. dungeon-of-doom" value="room1"/>
    <div class="fl">Your Name</div>
    <input class="fi" id="name-in" type="text" placeholder="Your character name..."/>
    <div class="fl">Role</div>
    <div class="role-grid">
      <button class="role-btn" onclick="selRole('gm',this)"><span class="ri">&#128081;</span>GAME MASTER</button>
      <button class="role-btn sel" onclick="selRole('player',this)"><span class="ri">&#9876;</span>PLAYER</button>
      <button class="role-btn" onclick="selRole('observer',this)"><span class="ri">&#128065;</span>OBSERVER</button>
    </div>
    <button class="enter-btn" onclick="joinRoom()">ENTER THE REALM</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="toolbar">
    <span class="tb-brand">&#9876; BATTLEMAP</span>
    <span id="role-badge" class="rbadge b-player">PLAYER</span>
    <span id="tb-name"></span>
    <div class="tb-sep"></div>
    <!-- GM only controls -->
    <span id="gm-ctrl" style="display:none;align-items:center;gap:6px;" class="role-ctrl">
      <button class="tb-btn" id="btn-grid" onclick="toggleGrid()">GRID</button>
      <button class="tb-btn" onclick="resetView()">RESET</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="document.getElementById('map-file').click()">UPLOAD MAP</button>
      <button class="tb-btn danger" onclick="clearMap()">CLEAR MAP</button>
      <button class="tb-btn" onclick="openTokModal('combat')">ADD TOKEN</button>
      <button class="tb-btn terrain-btn" onclick="openTokModal('terrain')">ADD TERRAIN</button>
      <div class="tb-sep"></div>
      <span class="tbl">GRID</span>
      <input class="tbn" id="gsz-in" type="number" value="50" min="20" max="150" onchange="updateGS(this.value)"/>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-init" onclick="openInitModal()">&#9876; INITIATIVE</button>
    </span>
    <!-- Player only controls -->
    <span id="pl-ctrl" style="display:none;align-items:center;gap:6px;" class="role-ctrl">
      <button class="tb-btn" onclick="openTokModal('player')">MY TOKEN</button>
    </span>
    <!-- Observer only controls -->
    <span id="obs-ctrl" style="display:none;align-items:center;gap:6px;" class="role-ctrl">
      <button class="tb-btn" id="btn-fs" onclick="toggleFullscreen()">&#9974; FULLSCREEN</button>
    </span>
    <span style="margin-left:auto;display:flex;align-items:center;gap:6px">
      <span class="tbl" id="room-lbl"></span>
      <button class="tb-btn danger" onclick="leaveRoom()">LEAVE</button>
    </span>
  </div>

  <div id="main">
    <div id="canvas-wrap">
      <canvas id="battlemap-canvas"></canvas>
      <div class="turn-banner" id="turn-banner"></div>
      <div class="lock-banner" id="lock-banner">&#128274; NOT YOUR TURN</div>
    </div>

    <div id="sidebar">
      <!-- Initiative Panel -->
      <div id="init-panel">
        <div id="init-header">
          <span class="init-title">&#9876; INITIATIVE</span>
          <span class="init-active-badge" id="init-badge">ACTIVE</span>
        </div>
        <div id="init-list"><div id="init-empty" class="empty-msg">No initiative — GM clicks &#9876; INITIATIVE</div></div>
        <div id="init-footer">
          <button class="icbtn next" id="btn-next" onclick="nextTurn()">&#9654; NEXT TURN</button>
          <button class="icbtn" onclick="openInitModal()">EDIT</button>
          <button class="icbtn end" onclick="endCombat()">END COMBAT</button>
        </div>
      </div>

      <!-- Token list -->
      <div class="stitle">Tokens on Map</div>
      <div id="token-list"></div>
      <div id="obs-note" style="display:none" class="empty-msg">Observer — view only</div>
    </div>
  </div>

  <div id="status-bar">
    <span><span id="conn-dot" style="color:var(--green)">&#9679;</span> <span id="conn-txt">CONNECTING</span></span>
    <span id="stat-msg">Initialising...</span>
    <span style="margin-left:auto" id="zoom-lbl">100%</span>
  </div>
</div>

<input type="file" id="map-file" accept="image/*" onchange="handleMap(event)"/>
<input type="file" id="tok-file" accept="image/*" onchange="handleTokImg(event)"/>
<div id="ctx-menu" class="ctx-menu"></div>
<div id="modal-wrap"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCA0pY7h5zTdZ-rxHnWHifEfR227n9VNfw",
  authDomain:"battlemap-decb4.firebaseapp.com",
  projectId:"battlemap-decb4",
  storageBucket:"battlemap-decb4.firebasestorage.app",
  messagingSenderId:"579724929236",
  appId:"1:579724929236:web:aa5d8981c3d94ccc44b341",
  databaseURL:"https://battlemap-decb4-default-rtdb.firebaseio.com"
});
const db=firebase.database();

const COLS=['#c94c4c','#c9844c','#c9c44c','#4cc96c','#4cb8c9','#4c6ec9','#8c4cc9','#c94c9c'];
let myRole='player',myName='',myId=uid(),roomId='room1';
let tokens={},mapImg=null,mapUrl=null;
let gridOn=true,gSz=50;
let panX=0,panY=0,zoom=1;
let dragging=null,dOX=0,dOY=0;
let panning=false,panStart=null,tdist=null;
let pendImg=null,pendCol=COLS[0];
let myTokId=null,imgCache={};
let tokRef,mapRef,setRef,initRef;
let initState={active:false,order:[],currentIdx:0};
let rafId=null;
let rotating=null,rotStart=null; // free rotation state

function uid(){return Math.random().toString(36).slice(2,9)+Date.now().toString(36)}

// ── LOGIN ─────────────────────────────────────────────────
function selRole(r,el){myRole=r;document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel')}
function joinRoom(){
  myName=document.getElementById('name-in').value.trim()||{gm:'Game Master',player:'Adventurer',observer:'Observer'}[myRole];
  roomId=(document.getElementById('room-in').value.trim()||'room1').replace(/\s+/g,'-');
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  setupUI();connectDB();
}
function leaveRoom(){
  db.ref('rooms/'+roomId).off();
  tokens={};mapImg=null;mapUrl=null;myTokId=null;imgCache={};
  panX=0;panY=0;zoom=1;initState={active:false,order:[],currentIdx:0};
  if(rafId){cancelAnimationFrame(rafId);rafId=null}
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
}

// ── SETUP ─────────────────────────────────────────────────
function setupUI(){
  const b=document.getElementById('role-badge');
  b.textContent=myRole==='gm'?'GM':myRole.toUpperCase();b.className='rbadge b-'+myRole;
  document.getElementById('tb-name').textContent=myName;
  document.getElementById('room-lbl').textContent='ROOM: '+roomId.toUpperCase();
  // Reset ALL role controls to hidden first (handles re-join with different role)
  ['gm-ctrl','pl-ctrl','obs-ctrl'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.cssText='display:none;align-items:center;gap:6px';
  });
  document.getElementById('obs-note').style.display='none';
  // Show only the right one
  if(myRole==='gm'){
    document.getElementById('gm-ctrl').style.cssText='display:flex;align-items:center;gap:6px';
  } else if(myRole==='player'){
    document.getElementById('pl-ctrl').style.cssText='display:flex;align-items:center;gap:6px';
  } else {
    document.getElementById('obs-ctrl').style.cssText='display:flex;align-items:center;gap:6px';
    document.getElementById('obs-note').style.display='block';
  }
  document.getElementById('btn-next').style.display=myRole==='gm'?'flex':'none';
  initCanvas();
  document.addEventListener('fullscreenchange',onFsChange);
  document.addEventListener('webkitfullscreenchange',onFsChange);
}

function toggleFullscreen(){
  const el=document.getElementById('canvas-wrap');
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    const req=el.requestFullscreen||el.webkitRequestFullscreen;
    if(req)req.call(el).catch(()=>{});
  } else {
    const ex=document.exitFullscreen||document.webkitExitFullscreen;
    if(ex)ex.call(document).catch(()=>{});
  }
}

function onFsChange(){
  const isFs=!!(document.fullscreenElement||document.webkitFullscreenElement);
  const btn=document.getElementById('btn-fs');
  if(btn)btn.textContent=isFs?'✕ EXIT FULLSCREEN':'⛶ FULLSCREEN';
  if(btn)btn.classList.toggle('active',isFs);

  setTimeout(resize,100);
}

function connectDB(){
  const room=db.ref('rooms/'+roomId);
  tokRef=room.child('tokens');mapRef=room.child('map');
  setRef=room.child('settings');initRef=room.child('initiative');
  tokRef.on('value',s=>{tokens=s.val()||{};renderSidebar();drawAll()});
  mapRef.on('value',s=>{
    const d=s.val();
    if(d&&d.url){if(mapUrl!==d.url){mapUrl=d.url;const i=new Image();i.onload=()=>{mapImg=i;drawAll()};i.src=d.url}}
    else{mapImg=null;mapUrl=null;drawAll()}
  });
  setRef.on('value',s=>{
    const sv=s.val()||{};gridOn=sv.gridOn!==undefined?sv.gridOn:true;gSz=sv.gSz||50;
    const gszEl=document.getElementById('gsz-in');if(gszEl)gszEl.value=gSz;
    const bgEl=document.getElementById('btn-grid');if(bgEl)bgEl.classList.toggle('active',gridOn);drawAll();

// ── CANVAS ────────────────────────────────────────────────
const $c=()=>document.getElementById('battlemap-canvas');
const $g=()=>$c().getContext('2d');
const $w=()=>document.getElementById('canvas-wrap');

function initCanvas(){
  resize();window.addEventListener('resize',resize);
  const c=$c();
  c.addEventListener('mousedown',onMD);c.addEventListener('mousemove',onMM);
  c.addEventListener('mouseup',onMU);c.addEventListener('mouseleave',onMU);
  c.addEventListener('contextmenu',onRC);c.addEventListener('wheel',onWh,{passive:false});
  c.addEventListener('touchstart',onTS,{passive:false});c.addEventListener('touchmove',onTM,{passive:false});
  c.addEventListener('touchend',onTE);
}
function resize(){const w=$w(),c=$c();c.width=w.clientWidth;c.height=w.clientHeight;drawAll()}

function drawAll(){
  const c=$c(),g=$g();
  g.clearRect(0,0,c.width,c.height);g.save();g.translate(panX,panY);g.scale(zoom,zoom);
  if(mapImg){g.drawImage(mapImg,0,0)}
  else{
    g.fillStyle='#0d0d18';g.fillRect(-panX/zoom-10,-panY/zoom-10,c.width/zoom+20,c.height/zoom+20);
    g.strokeStyle='rgba(201,168,76,0.07)';g.lineWidth=0.5/zoom;
    for(let x=0;x<6000;x+=gSz){g.beginPath();g.moveTo(x,0);g.lineTo(x,6000);g.stroke()}
    for(let y=0;y<6000;y+=gSz){g.beginPath();g.moveTo(0,y);g.lineTo(6000,y);g.stroke()}
    g.fillStyle='rgba(201,168,76,0.3)';g.font=(16/zoom)+'px Cinzel,serif';g.textAlign='center';g.textBaseline='middle';
    g.fillText(myRole==='gm'?'No map — click UPLOAD MAP':'Awaiting map from Game Master...',c.width/(2*zoom),c.height/(2*zoom));
  }
  if(gridOn)drawGrid(g,c);
  // Draw terrain first, then combat tokens on top
  const allToks=Object.values(tokens).filter(Boolean);
  allToks.filter(t=>t.terrain).forEach(t=>drawToken(g,t));
  allToks.filter(t=>!t.terrain).forEach(t=>drawToken(g,t));
  // Glow ring on current-turn token
  if(initState.active&&initState.order.length){
    const cur=initState.order[initState.currentIdx||0];
    if(cur&&cur.tokId&&tokens[cur.tokId])drawGlow(g,tokens[cur.tokId]);
  }
  g.restore();
  document.getElementById('zoom-lbl').textContent=Math.round(zoom*100)+'%';
}

function drawGrid(g,c){
  g.save();g.strokeStyle='rgba(201,168,76,0.13)';g.lineWidth=0.5/zoom;
  const sx=-panX/zoom,sy=-panY/zoom,ex=sx+c.width/zoom,ey=sy+c.height/zoom;
  const ox=((sx%gSz)+gSz)%gSz,oy=((sy%gSz)+gSz)%gSz;
  for(let x=sx-ox;x<ex+gSz;x+=gSz){g.beginPath();g.moveTo(x,sy);g.lineTo(x,ey);g.stroke()}
  for(let y=sy-oy;y<ey+gSz;y+=gSz){g.beginPath();g.moveTo(sx,y);g.lineTo(ex,y);g.stroke()}
  g.restore();
}

function drawGlow(g,tok){
  const r=(tok.size||gSz)/2,cx=tok.x+r,cy=tok.y+r;
  const pulse=0.45+0.35*Math.sin(Date.now()/400);
  g.save();
  g.beginPath();g.arc(cx,cy,r+6/zoom,0,Math.PI*2);
  g.strokeStyle=`rgba(201,168,76,${pulse})`;g.lineWidth=3/zoom;g.stroke();
  g.beginPath();g.arc(cx,cy,r+10/zoom,0,Math.PI*2);
  g.strokeStyle=`rgba(201,168,76,${pulse*0.35})`;g.lineWidth=2/zoom;g.stroke();
  g.restore();
}

function drawToken(g,tok){
  const r=(tok.size||gSz)/2,cx=tok.x+r,cy=tok.y+r,isMe=tok.id===myTokId;
  const isTerrain=!!tok.terrain;
  const rot=(tok.rotation||0)*Math.PI/180;
  g.save();
  if(isTerrain&&rot!==0){g.translate(cx,cy);g.rotate(rot);g.translate(-cx,-cy)}
  if(tok.imageData){
    let img=imgCache[tok.id];
    if(!img){img=new Image();img.onload=()=>{imgCache[tok.id]=img;drawAll()};img.src=tok.imageData;imgCache[tok.id]=img}
    if(isTerrain){
      g.beginPath();g.rect(tok.x,tok.y,r*2,r*2);g.save();g.clip();
      if(img.complete&&img.naturalWidth)g.drawImage(img,tok.x,tok.y,r*2,r*2);
      else{g.fillStyle=(tok.color||'#4c7ec9')+'88';g.fill()}
      g.restore();
    } else {
      g.beginPath();g.arc(cx,cy,r-2,0,Math.PI*2);g.save();g.clip();
      if(img.complete&&img.naturalWidth)g.drawImage(img,tok.x+2,tok.y+2,(r-2)*2,(r-2)*2);
      else{g.fillStyle=tok.color||'#888';g.fill()}
      g.restore();
    }
  } else {
    if(isTerrain){
      g.beginPath();g.rect(tok.x,tok.y,r*2,r*2);
      g.fillStyle=(tok.color||'#4c7ec9')+'88';g.fill();
      g.fillStyle='rgba(255,255,255,0.7)';g.font='bold '+Math.max(8,r*.4)+'px Crimson Text,serif';
      g.textAlign='center';g.textBaseline='middle';g.fillText((tok.name||'?').slice(0,2).toUpperCase(),cx,cy);
    } else {
      g.beginPath();g.arc(cx,cy,r-2,0,Math.PI*2);g.fillStyle=tok.color||'#c94c4c';g.fill();
      g.fillStyle='#fff';g.font='bold '+Math.max(10,r*.45)+'px Crimson Text,serif';
      g.textAlign='center';g.textBaseline='middle';
      g.fillText((tok.name||'?').slice(0,2).toUpperCase(),cx,cy);
    }
  }
  // Border
  if(isTerrain){
    g.beginPath();g.rect(tok.x+1,tok.y+1,r*2-2,r*2-2);
    g.strokeStyle=tok.color||'#4c7ec9';g.lineWidth=1.5/zoom;g.stroke();
  } else {
    g.beginPath();g.arc(cx,cy,r-1.5,0,Math.PI*2);
    g.strokeStyle=isMe?'#fff':(tok.color||'#c94c4c');g.lineWidth=(isMe?3:1.5)/zoom;g.stroke();
  }
  // Label (combat only)
  if(!isTerrain){
    const fs=Math.max(9,r*.35);
    g.font=fs+'px Cinzel,serif';g.textAlign='center';g.textBaseline='top';
    g.lineWidth=3/zoom;g.strokeStyle='rgba(0,0,0,0.85)';
    g.strokeText(tok.name||'?',cx,tok.y+r*2+3/zoom);
    g.fillStyle='#e8e0d0';g.fillText(tok.name||'?',cx,tok.y+r*2+3/zoom);
  }
  g.restore();
}

// Pulse animation loop
function startPulse(){
  if(rafId)return;
  function loop(){if(initState.active){drawAll();rafId=requestAnimationFrame(loop)}else{rafId=null}}
  rafId=requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────
function wpos(ex,ey){const r=$c().getBoundingClientRect();return{x:(ex-r.left-panX)/zoom,y:(ey-r.top-panY)/zoom}}

function tokAt(wx,wy){
  const all=Object.values(tokens).filter(Boolean);
  // Hit-test combat tokens first (circles, on top visually), then terrain (rects, below)
  const hit=t=>{const r=(t.size||gSz)/2;if(t.terrain)return wx>=t.x&&wx<=t.x+r*2&&wy>=t.y&&wy<=t.y+r*2;const dx=wx-(t.x+r),dy=wy-(t.y+r);return Math.hypot(dx,dy)<=r};
  return all.filter(t=>!t.terrain).reverse().find(t=>hit(t)) || all.filter(t=>t.terrain).reverse().find(t=>hit(t));
}

function isMyTurn(){
  if(!initState.active||!initState.order.length)return true;
  const cur=initState.order[initState.currentIdx||0];
  if(!cur||!cur.tokId)return false; // NPC turn
  const tok=tokens[cur.tokId];
  return tok&&tok.ownerId===myId;
}

function canDrag(t){
  if(!t)return false;
  if(t.terrain)return myRole==='gm';
  if(myRole==='gm')return true;
  if(myRole==='player'&&t.ownerId===myId){
    return initState.active?isMyTurn():true;
  }
  return false;
}

function onMD(e){
  if(e.button===2)return;
  // If in rotation mode, commit the rotation on left-click
  if(rotating&&rotStart){
    const tok=tokens[rotStart.tokId];
    if(tok){
      const finalRot=Math.round(tok.rotation||0);
      tokRef.child(rotStart.tokId).update({rotation:finalRot});
    }
    rotating=null;rotStart=null;
    document.getElementById('canvas-wrap').classList.remove('rotating-mode');
    $c().style.cursor='crosshair';
    return;
  }
  hideCtx();
  const{x,y}=wpos(e.clientX,e.clientY);const tok=tokAt(x,y);
  if(tok&&canDrag(tok)){dragging=tok;dOX=x-tok.x;dOY=y-tok.y;$c().style.cursor='grabbing'}
  else{panning=true;panStart={x:e.clientX-panX,y:e.clientY-panY};$c().style.cursor='grabbing'}
}
function onMM(e){
  if(rotating&&rotStart){
    const{x,y}=wpos(e.clientX,e.clientY);
    const tok=tokens[rotStart.tokId];if(!tok)return;
    const r=(tok.size||gSz)/2;
    const angle=Math.atan2(y-(tok.y+r),x-(tok.x+r));
    const delta=(angle-rotStart.startAngle)*180/Math.PI;
    const newRot=((rotStart.baseRot+delta)%360+360)%360;
    // Update local preview only
    tokens[rotStart.tokId]={...tok,rotation:newRot};
    drawAll();
    return;
  }
  if(dragging){
    const{x,y}=wpos(e.clientX,e.clientY);
    const sv={x:dragging.x,y:dragging.y};dragging.x=x-dOX;dragging.y=y-dOY;
    drawAll();dragging.x=sv.x;dragging.y=sv.y;
  } else if(panning&&panStart){panX=e.clientX-panStart.x;panY=e.clientY-panStart.y;drawAll()}
}
function onMU(e){
  if(dragging){
    const{x,y}=wpos(e.clientX||0,e.clientY||0);let nx=x-dOX,ny=y-dOY;
    if(gridOn){nx=Math.round(nx/gSz)*gSz;ny=Math.round(ny/gSz)*gSz}
    tokRef.child(dragging.id).update({x:nx,y:ny});dragging=null;
  }
  panning=false;panStart=null;$c().style.cursor='crosshair';
}
function onRC(e){
  e.preventDefault();const{x,y}=wpos(e.clientX,e.clientY);const tok=tokAt(x,y);if(!tok)return;
  const items=[];
  const isOwner=myRole==='gm'||(myRole==='player'&&tok.ownerId===myId);
  if(isOwner&&!tok.terrain){items.push({label:'RENAME',fn:()=>renameTok(tok)});items.push({label:'CHANGE COLOR',fn:()=>changeCol(tok)})}
  if(myRole==='gm'){
    items.push({label:'RESIZE',fn:()=>resizeTok(tok)});
    if(tok.terrain){
      items.push({label:'FREE ROTATE',fn:()=>startRotate(tok,e.clientX,e.clientY)});
      items.push({label:'RESET ROTATION',fn:()=>tokRef.child(tok.id).update({rotation:0})});
    }
    if(!tok.terrain)items.push({label:'ADD TO INITIATIVE',fn:()=>quickAddToInit(tok)});
    items.push({label:'DELETE TOKEN',fn:()=>tokRef.child(tok.id).remove(),danger:true});
  }
  if(items.length)showCtx(e.clientX,e.clientY,items);
}

function startRotate(tok,cx,cy){
  rotating=tok;
  // Calculate angle from token center to mouse at start
  const{x,y}=wpos(cx,cy);
  const r=(tok.size||gSz)/2;
  rotStart={tokId:tok.id,baseRot:tok.rotation||0,startAngle:Math.atan2(y-(tok.y+r),x-(tok.x+r))};
  $c().style.cursor='crosshair';
  document.getElementById('canvas-wrap').classList.add('rotating-mode');
}
function onWh(e){
  e.preventDefault();const r=$c().getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
  const ns=Math.min(5,Math.max(0.1,zoom*(e.deltaY>0?.9:1.1)));
  panX=mx-(mx-panX)*(ns/zoom);panY=my-(my-panY)*(ns/zoom);zoom=ns;drawAll();
}
function onTS(e){
  if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;tdist=Math.hypot(dx,dy);return}
  const t=e.touches[0];onMD({button:0,clientX:t.clientX,clientY:t.clientY});
}
function onTM(e){
  e.preventDefault();
  if(e.touches.length===2&&tdist){
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);
    const mid={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    const r=$c().getBoundingClientRect(),mx=mid.x-r.left,my=mid.y-r.top;
    const ns=Math.min(5,Math.max(0.1,zoom*(d/tdist)));
    panX=mx-(mx-panX)*(ns/zoom);panY=my-(my-panY)*(ns/zoom);zoom=ns;tdist=d;drawAll();return;
  }
  const t=e.touches[0];onMM({clientX:t.clientX,clientY:t.clientY});
}
function onTE(){tdist=null;onMU({})}

// ── TOOLBAR ───────────────────────────────────────────────
function toggleGrid(){if(myRole!=='gm')return;gridOn=!gridOn;setRef.update({gridOn})}
function updateGS(v){if(myRole!=='gm')return;gSz=Math.max(20,Math.min(150,parseInt(v)||50));setRef.update({gSz})}
function resetView(){panX=0;panY=0;zoom=1;drawAll()}

function handleMap(e){
  const f=e.target.files[0];if(!f)return;
  compress(f,1920,.78,url=>{mapRef.set({url});document.getElementById('stat-msg').textContent='Map uploaded ('+Math.round(url.length/1024)+'KB)'});
  e.target.value='';
}
function compress(file,maxW,q,cb){
  const r=new FileReader();r.onload=ev=>{const i=new Image();i.onload=()=>{
    const ratio=Math.min(1,maxW/i.width),oc=document.createElement('canvas');
    oc.width=Math.round(i.width*ratio);oc.height=Math.round(i.height*ratio);
    oc.getContext('2d').drawImage(i,0,0,oc.width,oc.height);cb(oc.toDataURL('image/jpeg',q));
  };i.src=ev.target.result};r.readAsDataURL(file);
}
function clearMap(){if(!confirm('Remove the current map image?'))return;mapRef.remove()}

// type = 'combat' | 'terrain' | 'player'
function openTokModal(type){
  pendImg=null;

    <div class="mlabel">Color</div>

function pickCol(c,el){pendCol=c;document.getElementById('mt-col').value=c;document.querySelectorAll('.cp').forEach(e=>e.classList.remove('s'));el.classList.add('s')}
function handleTokImg(e){
  const f=e.target.files[0];if(!f)return;
  compress(f,300,.82,url=>{pendImg=url;const el=document.getElementById('mt-img-note');if(el)el.textContent='Image ready: '+f.name});
  e.target.value='';
}

function placeTok(type){
  const isTerrain=type==='terrain';
  const name=(document.getElementById('mt-n')?.value||'').trim()||(isTerrain?'Terrain':myName);
  const color=document.getElementById('mt-col')?.value||pendCol;
  const size=(type==='combat'||isTerrain)?parseInt(document.getElementById('mt-sz')?.value)||gSz:gSz;
  const addInit=type==='combat'&&document.getElementById('mt-init')?.checked;
  if(!isTerrain)pendCol=color;
  closeModal();
  const c=$c(),id=uid();
  const tok={id,name,color,size,
    x:Math.round(Math.max(0,(-panX/zoom+c.width/zoom/2-size/2)/gSz))*gSz,
    y:Math.round(Math.max(0,(-panY/zoom+c.height/zoom/2-size/2)/gSz))*gSz,
    ownerId:myId,ownerName:myName
  };
  if(isTerrain)tok.terrain=true;
  if(pendImg){tok.imageData=pendImg;pendImg=null}
  if(type==='player')myTokId=id;
  tokRef.child(id).set(tok);
  if(addInit)setTimeout(()=>quickAddToInitById(id,name,color,tok.imageData),400);
}

function renameTok(tok){
  showModal(`<div class="modal-title">RENAME TOKEN</div><div class="mlabel">New name</div><input class="fi" id="rn-n" type="text" value="${tok.name}"/>`,[
    {label:'CANCEL',fn:closeModal},{label:'RENAME',primary:true,fn:()=>{const n=(document.getElementById('rn-n')?.value||'').trim();if(n)tokRef.child(tok.id).update({name:n});closeModal()}}
  ]);
}
function changeCol(tok){
  const ps=COLS.map(c=>`<div class="cp" style="background:${c}" onclick="document.getElementById('cc-c').value='${c}'"></div>`).join('');
  showModal(`<div class="modal-title">TOKEN COLOR</div><div style="display:flex;align-items:center;gap:10px"><input type="color" id="cc-c" value="${tok.color||'#c94c4c'}" style="width:60px;height:44px"/><div class="cp-row">${ps}</div></div>`,[
    {label:'CANCEL',fn:closeModal},{label:'APPLY',primary:true,fn:()=>{tokRef.child(tok.id).update({color:document.getElementById('cc-c').value});closeModal()}}
  ]);
}
function resizeTok(tok){
  showModal(`<div class="modal-title">RESIZE TOKEN</div><div class="mlabel">Size in pixels</div><input class="fi" id="rs-s" type="number" value="${tok.size||gSz}" min="10" max="500"/>`,[
    {label:'CANCEL',fn:closeModal},{label:'APPLY',primary:true,fn:()=>{const s=parseInt(document.getElementById('rs-s')?.value)||gSz;tokRef.child(tok.id).update({size:s});closeModal()}}
  ]);
}

  const scoreMap={};
  (initState.order||[]).forEach(e=>{if(e.tokId)scoreMap[e.tokId]={score:e.score,checked:true}});

    <tr>
      <td style="padding:6px 8px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:14px;height:14px;border-radius:50%;background:${t.color||'#888'};flex-shrink:0"></div>
          <span style="font-size:14px;color:var(--text)">${t.name}</span>
        </div>
      </td>
      <td style="padding:6px 8px"><input type="number" id="isc-${t.id}" value="${scoreMap[t.id]?.score??''}" placeholder="—" min="-20" max="40"/></td>
      <td style="padding:6px 8px;text-align:center"><input type="checkbox" id="ich-${t.id}" ${scoreMap[t.id]?.checked?'checked':''}/></td>
    </tr>`).join(''):'<tr><td colspan="3" style="padding:16px;text-align:center;color:var(--text-muted);font-style:italic">No combat tokens on map</td></tr>';

  showModal(`
    <div class="modal-title">&#9876; INITIATIVE</div>
    <p style="font-size:13px;color:var(--text-muted)">Enter scores for each token. Uncheck to exclude. Sorted highest first.</p>
    <table class="init-tbl">
      <thead><tr><th>TOKEN</th><th>SCORE</th><th>IN?</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="mlabel">Add NPC / custom entry</div>
    <div style="display:flex;gap:8px">
      <input class="fi" id="i-npc-n" type="text" placeholder="NPC name" style="flex:1"/>
      <input class="fi" id="i-npc-s" type="number" placeholder="Score" style="width:90px"/>
    </div>
  `,[{label:'CANCEL',fn:closeModal},{label:'START / UPDATE',primary:true,fn:()=>startCombat(combatToks)}]);
}

function startCombat(combatToks){
  const order=[];
  combatToks.forEach(t=>{
    const chk=document.getElementById('ich-'+t.id);
    if(chk?.checked){
      const sc=parseInt(document.getElementById('isc-'+t.id)?.value)||0;
      order.push({tokId:t.id,name:t.name,score:sc,color:t.color||'#888',imageData:t.imageData||null});
    }
  });
  const npcName=(document.getElementById('i-npc-n')?.value||'').trim();
  const npcScore=parseInt(document.getElementById('i-npc-s')?.value)||0;
  if(npcName)order.push({tokId:'npc-'+uid(),name:npcName,score:npcScore,color:'#888',imageData:null});
  if(!order.length){alert('No tokens added to initiative!');return}
  order.sort((a,b)=>b.score-a.score);
  // preserve current position if possible
  const prevCur=initState.order[initState.currentIdx||0];
  let newIdx=0;
  if(prevCur){const fi=order.findIndex(e=>e.tokId===prevCur.tokId);if(fi>=0)newIdx=fi}
  closeModal();
  initRef.set({active:true,order,currentIdx:newIdx});
}

function quickAddToInit(tok){
  showModal(`
    <div class="modal-title">ADD TO INITIATIVE</div>
    <div class="mlabel">Initiative score for ${tok.name}</div>
    <input class="fi" id="qa-sc" type="number" placeholder="e.g. 15" min="-20" max="40"/>
  `,[{label:'CANCEL',fn:closeModal},{label:'ADD',primary:true,fn:()=>{
    const sc=parseInt(document.getElementById('qa-sc')?.value)||0;
    addEntryToOrder({tokId:tok.id,name:tok.name,score:sc,color:tok.color||'#888',imageData:tok.imageData||null});
    closeModal();
  }}]);
}
function quickAddToInitById(id,name,color,imageData){
  showModal(`
    <div class="modal-title">ADD TO INITIATIVE</div>
    <div class="mlabel">Initiative score for ${name}</div>
    <input class="fi" id="qa-sc" type="number" placeholder="e.g. 15" min="-20" max="40"/>
  `,[{label:'SKIP',fn:closeModal},{label:'ADD',primary:true,fn:()=>{
    const sc=parseInt(document.getElementById('qa-sc')?.value)||0;
    addEntryToOrder({tokId:id,name,score:sc,color:color||'#888',imageData:imageData||null});
    closeModal();
  }}]);
}
function addEntryToOrder(entry){
  const order=[...(initState.order||[])];
  const ei=order.findIndex(e=>e.tokId===entry.tokId);
  if(ei>=0)order.splice(ei,1);
  order.push(entry);
  order.sort((a,b)=>b.score-a.score);
  initRef.update({order,active:initState.active||false});
}

function nextTurn(){
  if(myRole!=='gm')return;
  const len=initState.order.length;if(!len)return;
  const next=((initState.currentIdx||0)+1)%len;
  initRef.update({currentIdx:next});
}

function endCombat(){
  if(myRole!=='gm'||!confirm('End combat and clear initiative?'))return;
  initRef.set({active:false,order:[],currentIdx:0});
}

function editInitEntry(idx){
  if(myRole!=='gm')return;
  const e=initState.order[idx];if(!e)return;
  showModal(`
    <div class="modal-title">EDIT ENTRY</div>
    <div class="mlabel">Name</div><input class="fi" id="ei-n" type="text" value="${e.name}"/>
    <div class="mlabel">Score</div><input class="fi" id="ei-s" type="number" value="${e.score}"/>
  `,[{label:'CANCEL',fn:closeModal},{label:'SAVE',primary:true,fn:()=>{
    const order=[...initState.order];
    order[idx]={...order[idx],name:(document.getElementById('ei-n')?.value||e.name).trim(),score:parseInt(document.getElementById('ei-s')?.value)||0};
    order.sort((a,b)=>b.score-a.score);
    initRef.update({order,currentIdx:0});closeModal();
  }}]);
}
function removeInitEntry(idx){
  const order=[...initState.order];order.splice(idx,1);
  let cur=Math.min(initState.currentIdx||0,Math.max(0,order.length-1));
  initRef.update({order,currentIdx:cur});
}

function renderInitPanel(){
  const list=document.getElementById('init-list');
  const badge=document.getElementById('init-badge');
  const footer=document.getElementById('init-footer');
  const btnInit=document.getElementById('btn-init');
  const order=initState.order||[];
  const active=initState.active;
  badge.style.display=active?'inline':'none';
  footer.style.display=active?'flex':'none';
  if(btnInit)btnInit.classList.toggle('init-active',active);
  if(!order.length){list.innerHTML='<div id="init-empty" class="empty-msg">No initiative — GM clicks &#9876; INITIATIVE</div>';return}
  list.innerHTML='';
  const curIdx=initState.currentIdx||0;
  order.forEach((entry,i)=>{
    const isCur=active&&i===curIdx;
    const div=document.createElement('div');div.className='irow'+(isCur?' cur':'');
    const av=entry.imageData
      ?`<img src="${entry.imageData}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
      :`<span>${(entry.name||'?').slice(0,2).toUpperCase()}</span>`;
    div.innerHTML=`
      <div class="iav" style="background:${entry.color||'#888'};border-color:${entry.color||'#888'}66">${av}</div>
      <div class="iscore">${entry.score}</div>
      <div class="iname">${entry.name}</div>
      ${isCur?'<div class="iturn">&#9654;</div>':''}
      ${myRole==='gm'?`<button class="iedit" title="Edit" onclick="editInitEntry(${i})">✎</button><button class="idel" title="Remove" onclick="removeInitEntry(${i})">✕</button>`:''}
    `;
    if(isCur)setTimeout(()=>div.scrollIntoView({block:'nearest',behavior:'smooth'}),50);
    list.appendChild(div);
  });
}

function updateBanners(){
  const banner=document.getElementById('turn-banner');
  const lock=document.getElementById('lock-banner');
  const order=initState.order||[];
  if(!initState.active||!order.length){banner.style.display='none';lock.style.display='none';return}
  const cur=order[initState.currentIdx||0];
  banner.textContent=(cur?cur.name:"?")+' — YOUR TURN';
  banner.style.display='block';
  if(myRole==='player'){
    lock.style.display=isMyTurn()?'none':'block';
  } else {lock.style.display='none'}
}

// ── SIDEBAR ───────────────────────────────────────────────
function renderSidebar(){
  const list=document.getElementById('token-list');
  const toks=Object.values(tokens).filter(Boolean);
  if(!toks.length){list.innerHTML='<div class="empty-msg">No tokens on the map</div>';return}
  list.innerHTML='';
  // terrain first, then combat
  [...toks.filter(t=>t.terrain),...toks.filter(t=>!t.terrain)].forEach(tok=>{
    const div=document.createElement('div');div.className='tok-item';
    const canDel=myRole==='gm'||(myRole==='player'&&tok.ownerId===myId&&!tok.terrain);
    const av=tok.imageData
      ?`<img src="${tok.imageData}" style="width:100%;height:100%;object-fit:cover;border-radius:${tok.terrain?'3px':'50%'}">`
      :`<span style="color:#fff;font-size:10px">${(tok.name||'?').slice(0,2).toUpperCase()}</span>`;
    div.innerHTML=`
      <div class="tok-av" style="background:${tok.color||'#888'};border-color:${tok.color||'#888'}66;border-radius:${tok.terrain?'3px':'50%'}">${av}</div>
      <div class="tok-inf">
        <div class="tok-n">${tok.name||'?'}</div>
        <div class="tok-o">${tok.terrain?'<span class="tbadge">TERRAIN</span>':tok.ownerName||''}</div>
      </div>
      ${canDel?`<button class="tok-del" onclick="event.stopPropagation();tokRef.child('${tok.id}').remove()">&#10005;</button>`:''}
    `;
    div.onclick=()=>{const r=(tok.size||gSz)/2;panX=-(tok.x+r)*zoom+$c().width/2;panY=-(tok.y+r)*zoom+$c().height/2;drawAll()};
    list.appendChild(div);
  });
}

// ── CTX MENU ──────────────────────────────────────────────
function showCtx(x,y,items){
  const m=document.getElementById('ctx-menu');m.innerHTML='';
  items.forEach(item=>{const d=document.createElement('div');d.className='ctx-item'+(item.danger?' danger':'');d.textContent=item.label;d.onclick=()=>{hideCtx();item.fn()};m.appendChild(d)});
  m.style.display='block';m.style.left=Math.min(x,window.innerWidth-180)+'px';m.style.top=Math.min(y,window.innerHeight-items.length*38)+'px';
}
function hideCtx(){document.getElementById('ctx-menu').style.display='none'}
document.addEventListener('click',hideCtx);

// ── MODAL ─────────────────────────────────────────────────
function showModal(bodyHtml,buttons){
  const btns=buttons.map((b,i)=>`<button class="${b.primary?'primary':''}" id="_b${i}">${b.label}</button>`).join('');
  document.getElementById('modal-wrap').innerHTML=`<div class="modal-bg"><div class="modal">${bodyHtml}<div class="modal-btns">${btns}</div></div></div>`;
  buttons.forEach((b,i)=>{document.getElementById('_b'+i).onclick=b.fn});
  setTimeout(()=>{const inp=document.querySelector('#modal-wrap input[type=text],#modal-wrap input[type=number]');if(inp)inp.focus()},50);
}
function closeModal(){document.getElementById('modal-wrap').innerHTML=''}
</script>
</body>
</html>
